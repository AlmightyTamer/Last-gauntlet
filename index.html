<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS RUSH — Neon Gauntlet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Orbitron', monospace; overflow: hidden; user-select: none;
  }
  #wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #title-bar { display: flex; align-items: center; justify-content: space-between; width: 900px; padding: 6px 0; }
  #game-title { font-size: 13px; font-weight: 900; letter-spacing: 6px; color: #00fff7; text-shadow: 0 0 10px #00fff7, 0 0 30px #00fff7; }
  #level-label { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: #ff6aff; letter-spacing: 3px; text-shadow: 0 0 8px #ff6aff; }
  #canvas-container {
    position: relative; width: 900px; height: 560px;
    border: 1px solid #1a1a2e;
    box-shadow: 0 0 0 1px #00fff730, 0 0 40px #00fff710, inset 0 0 60px #00001a;
    overflow: hidden;
  }
  canvas { display: block; width: 900px; height: 560px; }
  #canvas-container::after {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 10;
  }
  #controls-bar { display: flex; gap: 18px; align-items: center; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #ffffff50; letter-spacing: 2px; }
  .ctrl-key { display: inline-block; background: #ffffff0d; border: 1px solid #ffffff20; padding: 2px 6px; border-radius: 3px; color: #ffffffaa; margin-right: 4px; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="title-bar">
    <span id="game-title">BOSS RUSH</span>
    <span id="level-label">NEON GAUNTLET</span>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas" width="900" height="560"></canvas>
  </div>
  <div id="controls-bar">
    <span><span class="ctrl-key">W A S D</span> MOVE</span>
    <span><span class="ctrl-key">F</span> SHOOT</span>
    <span><span class="ctrl-key">H</span> HEAL</span>
    <span><span class="ctrl-key">ESC</span> SKIP SCENE</span>
    <span><span class="ctrl-key">R</span> RESTART</span>
  </div>
</div>
<script>
// ================================================================
//  BOSS RUSH — Neon Gauntlet  |  by Param Tyagi
//  9 Levels · Cinematic Cutscenes · Per-level Powerups · Hard Mode
//  [MODIFIED: easier difficulty, instant level advance, boss-death immunity]
// ================================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 560;

// ── Input ────────────────────────────────────────────────────────
const keys = {}, justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.key]) justPressed[e.key] = true;
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
function keyDown(k){ return !!keys[k]; }
function keyJust(k){ const v=!!justPressed[k]; justPressed[k]=false; return v; }

// ── Math ─────────────────────────────────────────────────────────
const lerp    = (a,b,t) => a+(b-a)*t;
const clamp   = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const rand    = (lo,hi) => lo+Math.random()*(hi-lo);
const randInt = (lo,hi) => Math.floor(rand(lo,hi+1));
const ang     = (a,b) => Math.atan2(b.y-a.y,b.x-a.x);
const easeOut = t => 1-Math.pow(1-t,3);
const easeIn  = t => t*t*t;

// ── Draw helpers ─────────────────────────────────────────────────
function glow(c,b=10){ ctx.shadowColor=c; ctx.shadowBlur=b; }
function noGlow(){ ctx.shadowBlur=0; }
function withAlpha(a,fn){ const p=ctx.globalAlpha; ctx.globalAlpha=clamp(a,0,1); fn(); ctx.globalAlpha=p; }

// ── Particles ────────────────────────────────────────────────────
let particles=[];
function spawnP(x,y,color,count=8,speed=3,upward=false){
  for(let i=0;i<count;i++){
    const a=upward?rand(-Math.PI,0):rand(0,Math.PI*2);
    const s=rand(speed*0.4,speed);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:rand(0.016,0.05),r:rand(2,5),color});
  }
}
function updateParticles(){
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life-=p.decay;p.r*=0.97;}
}
function drawParticles(){
  for(const p of particles){
    withAlpha(p.life,()=>{glow(p.color,8);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  }
  noGlow();
}

// ── Shake & Flash ────────────────────────────────────────────────
let shakeAmt=0;
function shake(a){ shakeAmt=Math.max(shakeAmt,a); }
let flashT=0,flashCol='#fff';
function flash(c='#fff',d=8){ flashT=d; flashCol=c; }

// ── Bullets ──────────────────────────────────────────────────────
function mkB(x,y,vx,vy,color,r=5,dmg=10,owner='player'){ return{x,y,vx,vy,color,r,dmg,owner,life:1}; }
function moveBullets(arr){
  for(const b of arr){b.x+=b.vx;b.y+=b.vy;}
  return arr.filter(b=>b.x>-30&&b.x<W+30&&b.y>-30&&b.y<H+30&&b.life>0);
}
function drawBullets(arr){
  for(const b of arr){
    glow(b.color,16); ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    withAlpha(0.28,()=>{ctx.beginPath();ctx.arc(b.x-b.vx*1.4,b.y-b.vy*1.4,b.r*0.65,0,Math.PI*2);ctx.fill();});
  }
  noGlow();
}

// ── Health bar ───────────────────────────────────────────────────
function drawHB(x,y,w,h,pct,label,color){
  ctx.fillStyle='#0a0a14'; ctx.strokeStyle=color+'50'; ctx.lineWidth=1;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);
  glow(color,8); ctx.fillStyle=color;
  ctx.fillRect(x+1,y+1,(w-2)*clamp(pct,0,1),h-2);
  noGlow();
  if(label){ ctx.fillStyle='#fff'; ctx.font='bold 10px Orbitron'; ctx.textAlign='left'; ctx.fillText(label,x,y-6); }
}

// ── Background ───────────────────────────────────────────────────
let bgOff=0;
function drawBG(tint){
  ctx.fillStyle='#020208'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#00fff708'; ctx.lineWidth=1;
  const gs=40,off=bgOff%gs;
  for(let x=-gs+off;x<W+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=-gs+off;y<H+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  bgOff+=0.35;
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.82);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'#000000d0');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  if(tint){ctx.fillStyle=tint; ctx.fillRect(0,0,W,H);}
}

// ================================================================
//  INTRO SPLASH
// ================================================================
let intro={timer:0,done:false,nameAlpha:0,nameScale:1.2,subtitleAlpha:0,bgAlpha:1};

function updateIntro(){
  intro.timer++;
  const t=intro.timer;
  intro.bgAlpha=clamp(1-t/35,0,1);
  if(t<50)        intro.nameAlpha=easeOut(t/50);
  else if(t<185)  intro.nameAlpha=1;
  else if(t<245)  intro.nameAlpha=1-easeIn((t-185)/60);
  else            intro.nameAlpha=0;
  if(t<50)        intro.nameScale=lerp(1.22,1.0,easeOut(t/50));
  else if(t<185)  intro.nameScale=1.0;
  else            intro.nameScale=lerp(1.0,1.08,easeIn((t-185)/60));
  if(t<115)       intro.subtitleAlpha=0;
  else if(t<160)  intro.subtitleAlpha=easeOut((t-115)/45);
  else if(t<185)  intro.subtitleAlpha=1;
  else if(t<230)  intro.subtitleAlpha=1-(t-185)/45;
  else            intro.subtitleAlpha=0;
  if(t>25&&(keyJust(' ')||keyJust('Enter')||keyJust('f')||keyJust('F')||keyJust('Escape'))){
    intro.done=true; gameState='menu';
  }
  if(t>=250){ intro.done=true; gameState='menu'; }
}

function drawIntro(ts){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<55;i++){
    const sx=((i*137+ts*0.006)%W), sy=((i*211+ts*0.004)%H);
    withAlpha(0.04+Math.sin(ts/900+i)*0.03,()=>{ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,0.7,0,Math.PI*2);ctx.fill();});
  }
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(intro.nameScale, intro.nameScale);
  withAlpha(intro.nameAlpha*0.22,()=>{
    const g=ctx.createRadialGradient(0,0,20,0,0,170);
    g.addColorStop(0,'#00fff7'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,170,0,Math.PI*2); ctx.fill();
  });
  withAlpha(intro.nameAlpha,()=>{
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.font='900 70px Orbitron';
    ctx.textAlign='center'; ctx.fillText('PARAM TYAGI',3,5);
    glow('#00fff7',28); ctx.fillStyle='#ffffff';
    ctx.fillText('PARAM TYAGI',0,0); noGlow();
    const uw=ctx.measureText('PARAM TYAGI').width*0.92;
    const lineY=24;
    glow('#00fff7',14);
    const lg=ctx.createLinearGradient(-uw/2,0,uw/2,0);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.2,'#00fff7');
    lg.addColorStop(0.8,'#00fff7'); lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-uw/2,lineY); ctx.lineTo(uw/2,lineY); ctx.stroke();
    noGlow();
  });
  ctx.restore();
  withAlpha(intro.subtitleAlpha,()=>{
    ctx.fillStyle='#ffffff55'; ctx.font='12px Share Tech Mono';
    ctx.textAlign='center'; ctx.fillText('P R E S E N T S',W/2,H/2+58);
  });
  if(intro.timer>55){
    withAlpha(Math.min(intro.nameAlpha,0.28),()=>{
      ctx.fillStyle='#fff'; ctx.font='9px Share Tech Mono';
      ctx.textAlign='center'; ctx.fillText('press any key to skip',W/2,H-26);
    });
  }
  if(intro.bgAlpha>0){ctx.fillStyle='#000';ctx.globalAlpha=intro.bgAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
}

// ================================================================
//  POWERUP SYSTEM
// ================================================================
const POWERUP_DEFS=[
  {id:'triple',     name:'TRIPLE SHOT',     icon:'▲▲▲', color:'#00fff7', desc:'Fires 3 bullets in a spread'},
  {id:'speed',      name:'OVERDRIVE',        icon:'▶▶',  color:'#ffcc00', desc:'+25% movement speed'},
  {id:'shield',     name:'REACTIVE SHIELD',  icon:'◈',   color:'#22ccff', desc:'Absorbs 1 hit every 8 seconds'},
  {id:'rapid',      name:'RAPID FIRE',        icon:'✦✦',  color:'#ff88ff', desc:'40% faster fire rate'},
  {id:'pierce',     name:'PIERCE ROUNDS',     icon:'→→',  color:'#00ffee', desc:'Bullets pass through enemies'},
  {id:'regen',      name:'BIO-REGEN',         icon:'♥',   color:'#00ff88', desc:'Slowly regenerate HP over time'},
  {id:'nova',       name:'DEATH NOVA',         icon:'✸',   color:'#ff6600', desc:'Explosion burst on taking damage'},
  {id:'overcharge', name:'OVERCHARGE',         icon:'⚡',  color:'#ffcc00', desc:'+50% damage & aura burns boss'},
];
const MAX_LEVELS=9;

let activePowerups=[];
let shieldCooldown=0, shieldActive=false;
let regenTimer=0;
let pickupItems=[];
let banner={active:false,timer:0,def:null};

function hasPU(id){ return activePowerups.includes(id); }
function grantPowerup(level){
  const idx=level-2;
  if(idx<0||idx>=POWERUP_DEFS.length) return null;
  const def=POWERUP_DEFS[idx];
  if(!activePowerups.includes(def.id)) activePowerups.push(def.id);
  return def;
}
function applyPowerupsToPlayer(){
  player.speed=4.2; player.shootRate=16;
  if(hasPU('speed'))  player.speed*=1.25;
  if(hasPU('rapid'))  player.shootRate=Math.floor(player.shootRate*0.6);
}
function showBanner(def){ banner={active:true,timer:0,def}; }
function updateBanner(){ if(banner.active){banner.timer++;if(banner.timer>185)banner.active=false;} }
function drawBanner(){
  if(!banner.active||!banner.def) return;
  const t=banner.timer, def=banner.def;
  let a=0;
  if(t<20) a=t/20; else if(t<145) a=1; else a=1-(t-145)/40;
  withAlpha(a,()=>{
    const bw=380,bh=66,bx=W/2-bw/2,by=18;
    ctx.fillStyle='#000000cc'; ctx.fillRect(bx,by,bw,bh);
    glow(def.color,14); ctx.strokeStyle=def.color; ctx.lineWidth=2;
    ctx.strokeRect(bx,by,bw,bh); noGlow();
    ctx.fillStyle=def.color+'55'; ctx.fillRect(bx,by,4,bh);
    glow(def.color,18); ctx.fillStyle=def.color;
    ctx.font='bold 24px Orbitron'; ctx.textAlign='center';
    ctx.fillText(def.icon,bx+36,by+42); noGlow();
    ctx.fillStyle=def.color; ctx.font='bold 12px Orbitron'; ctx.textAlign='left';
    ctx.fillText('POWERUP UNLOCKED',bx+68,by+24);
    ctx.fillStyle='#fff'; ctx.font='bold 15px Orbitron';
    ctx.fillText(def.name,bx+68,by+46);
    ctx.fillStyle='#ffffff60'; ctx.font='10px Share Tech Mono';
    ctx.fillText(def.desc,bx+68,by+62);
  });
}
function drawPowerupHUD(){
  if(activePowerups.length===0) return;
  const defs=POWERUP_DEFS.filter(d=>activePowerups.includes(d.id));
  const iconW=34,pad=4,startX=W-20-defs.length*(iconW+pad),y=H-46;
  ctx.fillStyle='#ffffff22'; ctx.font='8px Share Tech Mono'; ctx.textAlign='right';
  ctx.fillText('ARSENAL',W-20,y-8);
  for(let i=0;i<defs.length;i++){
    const d=defs[i], x=startX+i*(iconW+pad);
    ctx.fillStyle='#0a0a14'; ctx.strokeStyle=d.color+'60'; ctx.lineWidth=1;
    ctx.fillRect(x,y,iconW,iconW); ctx.strokeRect(x,y,iconW,iconW);
    glow(d.color,8); ctx.fillStyle=d.color;
    ctx.font='bold 13px Orbitron'; ctx.textAlign='center';
    ctx.fillText(d.icon,x+iconW/2,y+22); noGlow();
    if(d.id==='shield'&&shieldCooldown>0){
      withAlpha(0.55,()=>{ctx.fillStyle='#000';ctx.fillRect(x,y,iconW,iconW*(shieldCooldown/480));});
    }
  }
}

function updatePowerupPassives(){
  if(hasPU('shield')){
    if(shieldCooldown>0) shieldCooldown--;
    else shieldActive=true;
  }
  if(hasPU('regen')){
    regenTimer++;
    if(regenTimer>=90){
      if(player.hp<player.maxHp&&!player.dead) player.hp=Math.min(player.maxHp,player.hp+2);
      regenTimer=0;
    }
  }
  if(hasPU('overcharge')&&boss&&!boss.dead){
    if(Math.random()<0.04){
      boss.hp=Math.max(0,boss.hp-1);
      spawnP(boss.x+rand(-boss.w,boss.w),boss.y+rand(-boss.h,boss.h),'#ffcc00',2,2);
    }
  }
}

// ================================================================
//  PLAYER
// ================================================================
const HEALS=5,HEAL_AMT=28;
const player={
  x:W/2,y:H-100,w:20,h:24,speed:4.2,
  hp:100,maxHp:100,
  bullets:[],shootCD:0,shootRate:16,
  iframes:0,dead:false,trail:[],
  healCharges:HEALS,healCD:0,healAnim:0,healPopT:0,healPopTxt:''
};

function resetPlayer(){
  player.x=W/2;player.y=H-100;player.hp=100;player.maxHp=100;
  player.bullets=[];player.shootCD=0;player.iframes=0;player.dead=false;player.trail=[];
  player.healCharges=HEALS;player.healCD=0;player.healAnim=0;player.healPopT=0;
  shieldActive=false;shieldCooldown=0;regenTimer=0;
  applyPowerupsToPlayer();
}

function updatePlayer(){
  if(player.dead)return;
  let mv=false;
  if(keyDown('w')||keyDown('W')||keyDown('ArrowUp'))    {player.y-=player.speed;mv=true;}
  if(keyDown('s')||keyDown('S')||keyDown('ArrowDown'))  {player.y+=player.speed;mv=true;}
  if(keyDown('a')||keyDown('A')||keyDown('ArrowLeft'))  {player.x-=player.speed;mv=true;}
  if(keyDown('d')||keyDown('D')||keyDown('ArrowRight')) {player.x+=player.speed;mv=true;}
  player.x=clamp(player.x,player.w,W-player.w);
  player.y=clamp(player.y,player.h,H-player.h);
  if(mv)player.trail.push({x:player.x,y:player.y,a:1});
  if(player.trail.length>12)player.trail.shift();
  player.trail.forEach(t=>t.a-=0.085);
  player.trail=player.trail.filter(t=>t.a>0);

  if(player.shootCD>0)player.shootCD--;
  if((keyDown('f')||keyDown('F'))&&player.shootCD===0){
    const bx=player.x,by=player.y-player.h;
    const dmgM=hasPU('overcharge')?1.5:1;
    player.bullets.push(mkB(bx,by,0,-10,'#00fff7',4,Math.round(11*dmgM),'player'));
    if(hasPU('triple')){
      player.bullets.push(mkB(bx,by,-2.2,-9.2,'#00fff7',3,Math.round(9*dmgM),'player'));
      player.bullets.push(mkB(bx,by,2.2,-9.2,'#00fff7',3,Math.round(9*dmgM),'player'));
    }
    if(currentLevel>=6){
      player.bullets.push(mkB(bx,by,-4,-8,'#44ffff',3,Math.round(8*dmgM),'player'));
      player.bullets.push(mkB(bx,by,4,-8,'#44ffff',3,Math.round(8*dmgM),'player'));
    }
    player.shootCD=player.shootRate;
    spawnP(bx,by,'#00fff7',3,2);
  }

  if(player.healCD>0)player.healCD--;
  if((keyJust('h')||keyJust('H'))&&player.healCD===0){
    if(player.healCharges>0&&player.hp<player.maxHp){
      const g=Math.min(HEAL_AMT,player.maxHp-player.hp);
      player.hp=Math.min(player.maxHp,player.hp+HEAL_AMT);
      player.healCharges--;player.healAnim=75;player.healCD=28;
      player.healPopT=90;player.healPopTxt=`+${g} HP`;
      flash('#00ff88',4);shake(3);spawnP(player.x,player.y,'#00ff88',24,4,true);
    } else if(player.healCharges===0){
      player.healPopT=60;player.healPopTxt='NO HEALS LEFT';player.healCD=22;flash('#ff4444',3);
    } else {
      player.healPopT=60;player.healPopTxt='ALREADY FULL';player.healCD=22;
    }
  }
  if(player.healAnim>0)player.healAnim--;
  if(player.healPopT>0)player.healPopT--;
  player.bullets=moveBullets(player.bullets);
  if(player.iframes>0)player.iframes--;
  updatePowerupPassives();
  updateBanner();
}

function drawPlayer(){
  for(const t of player.trail){
    withAlpha(t.a*0.28,()=>{ctx.fillStyle='#00fff7';ctx.fillRect(t.x-player.w*0.6,t.y-player.h*0.6,player.w*1.2,player.h*1.2);});
  }
  if(player.dead){drawBullets(player.bullets);return;}
  const blink=player.iframes>0&&Math.floor(player.iframes/3)%2===0;
  if(blink)ctx.globalAlpha=0.35;
  const px=player.x,py=player.y;

  if(player.healAnim>0){
    for(let ring=0;ring<2;ring++){
      const t=1-((player.healAnim-ring*14)/75);
      if(t<0||t>1)continue;
      withAlpha((1-t)*0.8,()=>{glow('#00ff88',22);ctx.strokeStyle='#00ff88';ctx.lineWidth=2+ring;ctx.beginPath();ctx.arc(px,py,t*72,0,Math.PI*2);ctx.stroke();});
    }
    noGlow();
  }

  if(shieldActive&&hasPU('shield')){
    withAlpha(0.5+Math.sin(Date.now()/300)*0.2,()=>{
      glow('#22ccff',20);ctx.strokeStyle='#22ccff';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(px,py,36,0,Math.PI*2);ctx.stroke();noGlow();
    });
  }

  if(hasPU('overcharge')){
    withAlpha(0.1+Math.sin(Date.now()/200)*0.06,()=>{
      glow('#ffcc00',32);ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(px,py,44,0,Math.PI*2);ctx.fill();noGlow();
    });
  }

  glow('#00fff7',22);ctx.fillStyle='#00fff7';
  ctx.beginPath();
  ctx.moveTo(px,py-player.h);ctx.lineTo(px-player.w*0.7,py+player.h*0.5);
  ctx.lineTo(px-player.w*0.3,py+player.h*0.2);ctx.lineTo(px,py+player.h*0.5);
  ctx.lineTo(px+player.w*0.3,py+player.h*0.2);ctx.lineTo(px+player.w*0.7,py+player.h*0.5);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#001a1a';ctx.beginPath();ctx.ellipse(px,py-player.h*0.3,6,8,0,0,Math.PI*2);ctx.fill();
  glow('#ff6aff',18);ctx.fillStyle='#ff6aff';ctx.beginPath();ctx.ellipse(px,py+player.h*0.55,5,3,0,0,Math.PI*2);ctx.fill();
  noGlow();ctx.globalAlpha=1;

  if(player.healPopT>0){
    const t=player.healPopT/90,rise=(1-t)*32;
    const isErr=player.healPopTxt.startsWith('NO')||player.healPopTxt.startsWith('AL');
    withAlpha(t,()=>{glow(isErr?'#ff4444':'#00ff88',14);ctx.fillStyle=isErr?'#ff6666':'#00ff88';ctx.font='bold 13px Orbitron';ctx.textAlign='center';ctx.fillText(player.healPopTxt,px,py-player.h-22-rise);noGlow();});
  }
  drawBullets(player.bullets);
}

let boss=null;
function createBoss(level){
  const def=BOSS_DEFS[Math.min(level-1,BOSS_DEFS.length-1)];
  return{...def,x:W/2,y:140,hp:def.baseHp,maxHp:def.baseHp,bullets:[],minions:[],phaseT:0,moveT:0,shootT:0,targetX:W/2,targetY:120,angle:0,pulseT:0,shielded:false,shieldHp:0,enraged:false,teleCD:0,chargeVx:0,chargeVy:0,charging:false,chargeLife:0,level,dead:false};
}

// MODIFIED: bullet speed multiplier reduced for easier gameplay (0.78x speed)
const SPD = 0.78;

function mkBB(b,x,y,vx,vy,col,r,dmg){b.bullets.push(mkB(x,y,vx*SPD,vy*SPD,col,r,dmg,'boss'));}
function bShootAt(b,tx,ty,spd,col,count=1,spread=0,dmg=12){
  // MODIFIED: reduced damage by ~30%, reduced spread slightly
  const reducedDmg = Math.max(6, Math.round(dmg * 0.70));
  const a=Math.atan2(ty-b.y,tx-b.x);
  for(let i=0;i<count;i++){const aa=a+(i-(count-1)/2)*spread;mkBB(b,b.x,b.y,Math.cos(aa)*spd,Math.sin(aa)*spd,col,5,reducedDmg);}
  spawnP(b.x,b.y,col,4,2);
}
function bSpiral(b,count,spd,col,dmg=8){
  const reducedDmg = Math.max(4, Math.round(dmg * 0.70));
  for(let i=0;i<count;i++){const a=(i/count)*Math.PI*2+b.angle;mkBB(b,b.x,b.y,Math.cos(a)*spd,Math.sin(a)*spd,col,4,reducedDmg);}
}
function bWall(b,count,col,dmg=16,vy=3.8){
  const reducedDmg = Math.max(8, Math.round(dmg * 0.70));
  for(let i=0;i<count;i++){const x=(i/(count-1))*W;mkBB(b,x,b.y+30,0,vy,col,6,reducedDmg);}
}
function bRing(b,count,spd,col,dmg=10){
  const reducedDmg = Math.max(5, Math.round(dmg * 0.70));
  for(let i=0;i<count;i++){const a=(i/count)*Math.PI*2;mkBB(b,b.x,b.y,Math.cos(a)*spd,Math.sin(a)*spd,col,5,reducedDmg);}
}

function updateBossAI(b){
  // MODIFIED: if boss is dead, stop all AI - no more bullets
  if(b.dead) return;

  b.phaseT++;b.shootT++;b.angle+=0.035;b.pulseT+=0.055;
  b.teleCD=Math.max(0,b.teleCD-1);
  // MODIFIED: enrage threshold lowered from 38% to 25% HP
  const hpPct=b.hp/b.maxHp;b.enraged=hpPct<0.25;const L=b.level;

  if(L===1){
    b.moveT+=0.009;b.targetX=W/2+Math.sin(b.moveT)*310;b.targetY=108+Math.sin(b.moveT*0.72)*45;
    b.x=lerp(b.x,b.targetX,0.032);b.y=lerp(b.y,b.targetY,0.032);
    // MODIFIED: shoot intervals increased (less frequent)
    if(b.shootT%90===0)bShootAt(b,player.x,player.y,4.5,'#ff4444',1,0,14);
    if(b.shootT%175===0)bSpiral(b,6,3,'#ff8888',10);
    if(b.enraged&&b.shootT%38===0)bShootAt(b,player.x,player.y,5,'#ff4444',3,0.28,12);
    if(b.enraged&&b.shootT%55===0)bSpiral(b,8,3.5,'#ff8888',11);
  }else if(L===2){
    b.moveT++;
    if(!b.charging){
      b.x=lerp(b.x,b.targetX,0.028);b.y=lerp(b.y,b.targetY,0.028);
      if(b.moveT%100===0){b.targetX=rand(80,W-80);b.targetY=rand(75,200);}
      if(b.shootT%50===0)bShootAt(b,player.x,player.y,5,'#ff9900',3,0.3,12);
      if(b.shootT%95===0)bSpiral(b,8,3.2,'#ffcc44',10);
      if(b.moveT%160===0){const a=ang(b,player);b.chargeVx=Math.cos(a)*11;b.chargeVy=Math.sin(a)*11;b.charging=true;b.chargeLife=32;}
    }else{
      b.x+=b.chargeVx;b.y+=b.chargeVy;b.chargeLife--;
      b.x=clamp(b.x,b.w,W-b.w);b.y=clamp(b.y,b.h,H*0.56);
      if(b.chargeLife<=0||b.x<=b.w||b.x>=W-b.w){b.charging=false;bSpiral(b,10,3.8,'#ffcc44',11);shake(8);}
    }
    if(b.enraged&&b.shootT%30===0)bShootAt(b,player.x,player.y,6,'#ff4400',5,0.22,14);
    if(b.enraged&&b.shootT%70===0)bWall(b,12,'#ff9900',14);
  }else if(L===3){
    b.moveT++;b.x=lerp(b.x,b.targetX,0.045);b.y=lerp(b.y,b.targetY,0.045);
    const freq=b.enraged?80:105;
    if(b.teleCD===0&&b.moveT%freq===0){
      spawnP(b.x,b.y,'#cc44ff',14,4);b.x=rand(80,W-80);b.y=rand(55,220);
      b.teleCD=freq;bSpiral(b,14,3.5,'#cc44ff',12);spawnP(b.x,b.y,'#cc44ff',14,4);
    }
    if(b.moveT%35===0){b.targetX=rand(80,W-80);b.targetY=rand(55,200);}
    if(b.shootT%36===0)bShootAt(b,player.x,player.y,6,'#cc44ff',2,0.18,16);
    if(b.shootT%105===0)bWall(b,10,'#ff88ff',15);
    if(b.enraged&&b.shootT%22===0)bShootAt(b,player.x,player.y,7,'#ff88ff',4,0.2,14);
    if(b.enraged&&b.shootT%42===0)bSpiral(b,10,3.8,'#aa44ff',12);
  }else if(L===4){
    b.moveT++;
    if(!b.shielded&&b.moveT%210===0&&hpPct<0.82){b.shielded=true;b.shieldHp=90;spawnP(b.x,b.y,'#22ccff',28,5);}
    if(b.shielded){b.shieldHp--;if(b.shieldHp<=0)b.shielded=false;}
    b.x=lerp(b.x,b.targetX,0.022);b.y=lerp(b.y,b.targetY,0.022);
    if(b.moveT%75===0){b.targetX=rand(100,W-100);b.targetY=rand(78,205);}
    if(b.shootT%66===0)bWall(b,13,'#22ccff',18);
    if(b.shootT%42===0)bShootAt(b,player.x,player.y,6,'#88eeff',3,0.28,20);
    if(b.shootT%145===0)bRing(b,16,4,'#22ccff',14);
    if(b.enraged&&b.shootT%26===0){bSpiral(b,14,4.5,'#22ccff',14);bWall(b,9,'#ff4444',18);}
  }else if(L===5){
    b.moveT++;
    const tFreq=b.enraged?55:105;
    if(b.teleCD===0&&b.moveT%tFreq===0){
      spawnP(b.x,b.y,'#ff44aa',18,5);b.x=rand(80,W-80);b.y=rand(55,240);
      b.teleCD=55;bSpiral(b,20,3.8,'#ff44aa',14);spawnP(b.x,b.y,'#ff44aa',18,5);
    }
    b.x=lerp(b.x,b.targetX,0.075);b.y=lerp(b.y,b.targetY,0.075);
    if(b.moveT%28===0){b.targetX=rand(80,W-80);b.targetY=rand(55,225);}
    if(b.shootT%32===0)bShootAt(b,player.x,player.y,7,'#ff44aa',4,0.22,22);
    if(b.shootT%65===0){bWall(b,15,'#ffaaff',18);bSpiral(b,18,4.2,'#ff44aa',14);}
    if(b.enraged){
      if(b.shootT%18===0)bShootAt(b,player.x,player.y,9,'#ffffff',6,0.18,24);
      if(b.shootT%50===0){bSpiral(b,26,5,'#ff44aa',16);bWall(b,20,'#cc00ff',20);}
    }
  }else if(L===6){
    b.moveT++;b.x=lerp(b.x,b.targetX,0.045);b.y=lerp(b.y,b.targetY,0.045);
    if(b.moveT%55===0){b.targetX=rand(110,W-110);b.targetY=rand(75,225);}
    for(const bul of b.bullets){const dx=b.x-bul.x,dy=b.y-bul.y,d=Math.hypot(dx,dy);if(d>25&&d<280){bul.vx+=dx*0.0025;bul.vy+=dy*0.0025;}}
    if(b.shootT%30===0)bShootAt(b,player.x,player.y,7.5,'#00ffee',3,0.18,24);
    if(b.shootT%75===0)bSpiral(b,22,4.5,'#00ffee',18);
    if(b.shootT%110===0)bRing(b,24,5,'#aaffff',16);
    if(b.enraged){if(b.shootT%16===0)bWall(b,22,'#ffffff',26);if(b.moveT%100===0)bRing(b,32,6,'#00ffee',20);}
  }else if(L===7){
    b.moveT++;b.x=lerp(b.x,b.targetX,0.032);b.y=lerp(b.y,b.targetY,0.032);
    if(b.moveT%90===0){b.targetX=rand(100,W-100);b.targetY=rand(65,215);}
    if(b.moveT%200===0&&b.minions.length<6){
      for(let i=0;i<3;i++){const side=i%2===0?1:-1;b.minions.push({x:b.x+side*180+rand(-30,30),y:b.y+rand(-60,60),hp:80,maxHp:80,shootT:randInt(0,50),color:'#ff6666',r:13});}
      spawnP(b.x,b.y,'#ff0000',50,7);shake(8);
    }
    for(const m of b.minions){m.shootT++;if(m.shootT>70){bShootAt({x:m.x,y:m.y},player.x,player.y,5,'#ff6666',2,0.2,16);m.shootT=0;}}
    b.minions=b.minions.filter(m=>m.hp>0);
    if(b.shootT%36===0)bShootAt(b,player.x,player.y,8,'#ff0000',4,0.24,28);
    if(b.shootT%90===0){bSpiral(b,26,5,'#ffaaff',20);bWall(b,14,'#ff0000',22);}
    if(b.enraged){if(b.shootT%20===0)bWall(b,26,'#ff0000',30);if(b.shootT%60===0)bSpiral(b,32,6,'#ffaaff',22);}
  }else if(L===8){
    b.moveT++;
    b.targetX=lerp(b.targetX,player.x,0.005)+Math.sin(b.phaseT*0.03)*220;
    if(b.moveT%50===0)b.targetY=rand(70,220);
    b.x=lerp(b.x,b.targetX,0.038);b.y=lerp(b.y,b.targetY,0.022);
    if(b.shootT%28===0)bShootAt(b,player.x,player.y,8.5,'#ff6600',4,0.2,28);
    if(b.shootT%60===0)bSpiral(b,28,5.5,'#ffaa00',22);
    if(b.shootT%85===0)bWall(b,20,'#ff6600',26,4.8);
    if(b.moveT%200===0){bRing(b,24,4.5,'#ff6600',22);bRing(b,16,6,'#ffaa00',24);bRing(b,8,8,'#ffffff',26);shake(18);flash('#ff6600',10);}
    if(b.enraged){
      if(b.shootT%16===0)bShootAt(b,player.x,player.y,10,'#ffffff',6,0.16,32);
      if(b.shootT%40===0){bWall(b,28,'#ff6600',30);bSpiral(b,36,7,'#ffaa00',26);}
      if(b.moveT%110===0)bRing(b,40,8,'#ff6600',28);
    }
  }else if(L===9){
    b.moveT++;
    b.targetX=W/2+Math.sin(b.phaseT*0.018)*360;b.targetY=130+Math.sin(b.phaseT*0.012)*90;
    b.x=lerp(b.x,b.targetX,0.05);b.y=lerp(b.y,b.targetY,0.05);
    if(b.shootT%20===0)bShootAt(b,player.x,player.y,9,'#ffcc00',4,0.2,30);
    if(b.shootT%45===0)bSpiral(b,32,5.5,'#ffcc00',24);
    if(b.shootT%70===0)bWall(b,24,'#fffaaa',28,5);
    if(b.shootT%95===0){bRing(b,30,5,'#ffcc00',26);bRing(b,16,8,'#fffaaa',28);}
    if(b.moveT%220===0&&b.minions.length<4){
      for(let i=0;i<2;i++){const side=(i*2-1);b.minions.push({x:b.x+side*200,y:b.y+rand(-40,40),hp:120,maxHp:120,shootT:0,color:'#ffcc00',r:16});}
      spawnP(b.x,b.y,'#ffcc00',60,8);shake(14);
    }
    for(const m of b.minions){m.shootT++;if(m.shootT>50){bShootAt({x:m.x,y:m.y},player.x,player.y,6,'#ffcc00',3,0.25,20);m.shootT=0;}}
    b.minions=b.minions.filter(m=>m.hp>0);
    if(b.enraged){
      if(b.shootT%12===0)bShootAt(b,player.x,player.y,11,'#ffffff',7,0.14,35);
      if(b.shootT%28===0){bSpiral(b,44,7,'#ffcc00',30);bWall(b,32,'#fffaaa',32);}
      if(b.moveT%60===0)bRing(b,48,9,'#ffcc00',32);
    }
  }
  b.bullets=moveBullets(b.bullets);
}

function drawBossShape(b,x,y,ts){
  const{w,h,color,accentColor,level}=b;
  const pulse=Math.sin(b.pulseT)*0.14+1;
  glow(color,28);ctx.fillStyle=color;
  if(level===1){ctx.save();ctx.translate(x,y);ctx.scale(pulse,pulse);ctx.beginPath();ctx.moveTo(0,-h);ctx.lineTo(w,0);ctx.lineTo(0,h);ctx.lineTo(-w,0);ctx.closePath();ctx.fill();ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();ctx.restore();}
  else if(level===2){ctx.save();ctx.translate(x,y);ctx.scale(pulse,pulse);ctx.beginPath();ctx.moveTo(0,-h*0.8);ctx.lineTo(w*0.4,-h*0.3);ctx.lineTo(w,-h*0.6);ctx.lineTo(w*0.7,0);ctx.lineTo(w,h*0.5);ctx.lineTo(0,h*0.3);ctx.lineTo(-w,h*0.5);ctx.lineTo(-w*0.7,0);ctx.lineTo(-w,-h*0.6);ctx.lineTo(-w*0.4,-h*0.3);ctx.closePath();ctx.fill();ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(0,-h*0.1,14,0,Math.PI*2);ctx.fill();ctx.restore();}
  else if(level===3){ctx.save();ctx.translate(x,y);ctx.rotate(b.angle*0.55+(ts||0)/2000);ctx.scale(pulse,pulse);ctx.beginPath();for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/6;i===0?ctx.moveTo(Math.cos(a)*w,Math.sin(a)*h):ctx.lineTo(Math.cos(a)*w,Math.sin(a)*h);}ctx.closePath();ctx.fill();ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();ctx.restore();}
  else if(level===4){ctx.save();ctx.translate(x,y);ctx.scale(pulse,pulse);ctx.fillRect(-w,-h,w*2,h*2);ctx.fillStyle=accentColor;ctx.fillRect(-w*0.6,-h*0.5,w*1.2,h);ctx.fillStyle=color;ctx.fillRect(-w-10,-h*1.3,18,h*0.8);ctx.fillRect(w-8,-h*1.3,18,h*0.8);ctx.restore();}
  else if(level===5){ctx.save();ctx.translate(x,y);for(let s=0;s<3;s++){ctx.save();ctx.rotate(b.angle*(s+1)*0.5+(ts||0)/(2000+s*400));ctx.scale(pulse,pulse);ctx.beginPath();for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;const r=i%2===0?w:w*0.4;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();withAlpha(s===0?1:0.5,()=>{ctx.fill();});ctx.restore();}glow('#fff',22);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();ctx.restore();}
  else if(level===6){ctx.save();ctx.translate(x,y);ctx.scale(pulse*1.15,pulse*1.15);ctx.beginPath();for(let i=0;i<14;i++){const a=(i/14)*Math.PI*2;const r=w*(0.28+0.72*Math.abs(Math.sin(a*5+b.pulseT)));i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();ctx.restore();}
  else if(level===7){ctx.save();ctx.translate(x,y);ctx.scale(pulse*1.08,pulse*1.08);ctx.beginPath();for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2+Math.sin(b.pulseT)*0.28;const r=(i%2===0?w*1.18:w*0.62)*(1+Math.sin(a*4+b.pulseT*2)*0.1);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();glow('#ffaaff',22);ctx.fillStyle='#ffaaff';ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();noGlow();ctx.restore();}
  else if(level===8){ctx.save();ctx.translate(x,y);ctx.rotate(b.angle*0.4);ctx.scale(pulse,pulse);ctx.beginPath();for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;const r=i%2===0?w*1.1:w*0.45;const jitter=1+Math.sin(b.pulseT*3+i)*0.15;i===0?ctx.moveTo(Math.cos(a)*r*jitter,Math.sin(a)*r*jitter):ctx.lineTo(Math.cos(a)*r*jitter,Math.sin(a)*r*jitter);}ctx.closePath();ctx.fill();ctx.fillStyle=accentColor;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();ctx.restore();}
  else if(level===9){ctx.save();ctx.translate(x,y);for(let ring=0;ring<4;ring++){const ra=b.angle*(ring%2===0?1:-1)*(ring*0.3+0.5)+(ts||0)/(1800+ring*300);ctx.save();ctx.rotate(ra);ctx.scale(pulse*(1-ring*0.12),pulse*(1-ring*0.12));const sides=6+ring*2;ctx.beginPath();for(let i=0;i<sides;i++){const a=(i/sides)*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*w,Math.sin(a)*h):ctx.lineTo(Math.cos(a)*w,Math.sin(a)*h);}ctx.closePath();withAlpha(ring===0?1:0.6-ring*0.1,()=>{ctx.fill();});ctx.restore();}glow('#fff',28);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();ctx.restore();}
  noGlow();
}

function drawBoss(b,ts){
  const{x,y,color,accentColor,minions=[]}=b;
  // MODIFIED: don't draw minions if boss is dead
  if(!b.dead){
    for(const m of minions){glow(m.color,14);ctx.fillStyle=m.color;ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill();noGlow();drawHB(m.x-18,m.y-m.r-12,36,6,m.hp/m.maxHp,null,m.color);}
    if(b.shielded){withAlpha(0.3+Math.sin(b.pulseT*3)*0.15,()=>{glow(accentColor,32);ctx.strokeStyle=accentColor;ctx.lineWidth=4;ctx.beginPath();ctx.arc(x,y,b.w*1.55,0,Math.PI*2);ctx.stroke();});}
    if(b.enraged){withAlpha(0.14+Math.sin(b.pulseT*5)*0.1,()=>{glow(color,48);ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,b.w*2.3,0,Math.PI*2);ctx.fill();});}
    drawBossShape(b,x,y,ts);
    noGlow();glow('#fff',14);withAlpha(0.92,()=>{ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();});noGlow();
    drawBullets(b.bullets);
  }
}

// ── HUD ──────────────────────────────────────────────────────────
function drawHUD(){
  drawHB(20,H-30,220,14,player.hp/player.maxHp,'PILOT SYSTEMS','#00fff7');
  const cx0=20,cy0=H-60;
  ctx.fillStyle='#ffffff50';ctx.font='9px Orbitron';ctx.textAlign='left';ctx.fillText('HEALS',cx0,cy0);
  for(let i=0;i<HEALS;i++){
    const filled=i<player.healCharges;
    const px=cx0+44+i*23,py=cy0-7;
    glow(filled?'#00ff88':'#222',filled?12:0);
    ctx.fillStyle=filled?'#00ff88':'#111520';ctx.strokeStyle=filled?'#00ff88':'#2a2a44';ctx.lineWidth=1.5;

  }

    if(boss.enraged){withAlpha(0.72+Math.sin(Date.now()/90)*0.28,()=>{ctx.fillStyle=boss.color;ctx.font='bold 12px Orbitron';ctx.textAlign='right';ctx.fillText('⚠ ENRAGE',W-20,55);});}

  drawPowerupHUD();
  drawBanner();
}

// ── Collision ─────────────────────────────────────────────────────
function circleRect(cx,cy,cr,rx,ry,rw,rh){return Math.hypot(cx-clamp(cx,rx-rw,rx+rw),cy-clamp(cy,ry-rh,ry+rh))<cr;}
function checkCollisions(){
  // MODIFIED: skip all collision if boss is dead
  if(boss.dead) return;

  for(const b of player.bullets){
    if(circleRect(b.x,b.y,b.r,boss.x,boss.y,boss.w,boss.h)){
      if(boss.shielded){spawnP(b.x,b.y,'#22ccff',6,3);b.life=0;}
      else{boss.hp-=b.dmg;if(!hasPU('pierce'))b.life=0;spawnP(b.x,b.y,boss.color,8,3);flash(boss.color,3);shake(2);if(boss.hp<=0){boss.hp=0;triggerBossDeath();}}
    }
    for(const m of boss.minions||[]){
      if(Math.hypot(b.x-m.x,b.y-m.y)<m.r){m.hp-=b.dmg;if(!hasPU('pierce'))b.life=0;spawnP(m.x,m.y,m.color,6,3);if(m.hp<=0)spawnP(m.x,m.y,m.color,20,5);break;}
    }
  }
  if(player.iframes===0&&!player.dead){
    for(const b of boss.bullets){
      if(circleRect(b.x,b.y,b.r,player.x,player.y,player.w*0.68,player.h*0.68)){
        if(shieldActive&&hasPU('shield')){b.life=0;shieldActive=false;shieldCooldown=480;spawnP(player.x,player.y,'#22ccff',20,5);flash('#22ccff',4);shake(4);continue;}
        player.hp-=b.dmg;b.life=0;player.iframes=52;
        spawnP(player.x,player.y,'#00fff7',10,3);flash('#ff0000',6);shake(6);
        if(hasPU('nova')&&player.hp>0){
          for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;player.bullets.push(mkB(player.x,player.y,Math.cos(a)*6,Math.sin(a)*6,'#ff6600',4,10,'player'));}
          spawnP(player.x,player.y,'#ff6600',30,6);flash('#ff6600',5);
        }
        if(player.hp<=0){player.hp=0;triggerPlayerDeath();}
      }
    }
  }
}

let cs={active:false,shots:[],shotIdx:0,phase:'in',fadeP:0,mainT:0,lineIdx:0,charIdx:0,holdT:0,linesDone:false,scanY:-50,hbT:0,locAlpha:0,locT:0,locActive:false,bossColor:'#fff'};

function startCutscene(level){
  const def=BOSS_DEFS[Math.min(level-1,BOSS_DEFS.length-1)];
  cs={active:true,shots:SHOTS[Math.min(level-1,SHOTS.length-1)],shotIdx:0,phase:'in',fadeP:0,mainT:0,lineIdx:0,charIdx:0,holdT:0,linesDone:false,scanY:-50,hbT:0,locAlpha:0,locT:0,locActive:false,bossColor:def.color};
}
function endCutscene(){cs.active=false;gameState='playing';}

function updateCutscene(){
  if(!cs.active)return;
  if(keyJust('Escape')){endCutscene();return;}
  const shot=cs.shots[cs.shotIdx];if(!shot){endCutscene();return;}
  if(cs.phase==='in'){
    cs.fadeP=Math.min(1,cs.fadeP+1/Math.max(1,shot.fadeIn));
    if(cs.fadeP>=1){cs.phase='main';cs.mainT=0;cs.lineIdx=0;cs.charIdx=0;cs.holdT=0;cs.linesDone=!shot.lines||shot.lines.length===0;cs.scanY=-50;if(shot.loc){cs.locActive=true;cs.locT=0;cs.locAlpha=0;}}
    return;
  }
  if(cs.phase==='main'){
    cs.mainT++;cs.hbT++;
    const efx=shot.efx||[];
    if(efx.includes('scan')){cs.scanY+=3.5;if(cs.scanY>H+55)cs.scanY=-55;}
    if(cs.locActive){cs.locT++;if(cs.locT<38)cs.locAlpha=cs.locT/38;else if(cs.locT<155)cs.locAlpha=1;else if(cs.locT<185)cs.locAlpha=(185-cs.locT)/30;else{cs.locActive=false;cs.locAlpha=0;}}
    if(!cs.linesDone&&shot.lines&&cs.lineIdx<shot.lines.length){
      const line=shot.lines[cs.lineIdx];
      if(cs.charIdx<line.txt.length){cs.charIdx=Math.min(line.txt.length,cs.charIdx+2);}
      else{cs.holdT++;if(cs.holdT>=82){cs.lineIdx++;cs.charIdx=0;cs.holdT=0;if(cs.lineIdx>=(shot.lines||[]).length)cs.linesDone=true;}}
    }else cs.linesDone=true;
    const skip=keyJust('f')||keyJust('F')||keyJust(' ')||keyJust('Enter');
    if(skip){
      if(!cs.linesDone&&shot.lines&&cs.lineIdx<shot.lines.length){const l=shot.lines[cs.lineIdx];if(cs.charIdx<l.txt.length)cs.charIdx=l.txt.length;else cs.holdT=82;}
      else{cs.phase='out';cs.fadeP=0;}
    }
    const minDur=shot.lines&&shot.lines.length>0?shot.lines.length*100:80;
    if(cs.linesDone&&cs.mainT>=minDur){cs.phase='out';cs.fadeP=0;}
    return;
  }
  if(cs.phase==='out'){
    cs.fadeP=Math.min(1,cs.fadeP+1/Math.max(1,shot.fadeOut));
    if(cs.fadeP>=1){cs.shotIdx++;if(cs.shotIdx>=cs.shots.length)endCutscene();else{cs.phase='in';cs.fadeP=0;cs.mainT=0;cs.scanY=-50;cs.locActive=false;cs.locAlpha=0;}}
  }
}

function drawCutscene(ts){
  const shot=cs.shots[cs.shotIdx];if(!shot)return;
  let ovAlpha=0;if(cs.phase==='in')ovAlpha=1-cs.fadeP;if(cs.phase==='out')ovAlpha=cs.fadeP;
  const tc=shot.tc||'#000';
  const zT=Math.min(1,cs.mainT/Math.max(1,90))*0.55;
  const camZoom=lerp(shot.zoom||1,shot.zoomEnd||(shot.zoom||1),zT);
  const focY=shot.focusY!==undefined?shot.focusY:H/2;
  ctx.save();ctx.translate(W/2,H/2);ctx.scale(camZoom,camZoom);ctx.translate(-W/2,-focY);
  drawBG(shot.tint||null);updateParticles();drawParticles();
  if(shot.showBoss&&boss){
    boss.pulseT+=0.055;boss.angle+=0.033;
    const sc=shot.bScale||1.8,al=shot.bAlpha!==undefined?shot.bAlpha:1;
    withAlpha(0.12+Math.sin(ts/500)*0.05,()=>{glow(cs.bossColor,75);ctx.fillStyle=cs.bossColor;ctx.beginPath();ctx.arc(W/2,focY+28,88*sc*0.35,0,Math.PI*2);ctx.fill();noGlow();});
    ctx.save();ctx.translate(W/2,focY+28);ctx.scale(sc,sc);withAlpha(al,()=>drawBossShape(boss,0,0,ts));ctx.restore();
    if(cs.phase==='in'&&cs.fadeP>0.88&&cs.fadeP<0.97){shake(12);for(let i=0;i<5;i++)spawnP(W/2+rand(-90,90),focY+rand(-20,22),boss.color,6,5);}
  }
  ctx.restore();
  const efx=shot.efx||[];
  if(efx.includes('static')||efx.includes('heavy')){const n=efx.includes('heavy')?350:140;ctx.fillStyle='#fff';for(let i=0;i<n;i++){ctx.globalAlpha=Math.random()*0.12;ctx.fillRect(Math.random()*W,Math.random()*H,Math.random()*5+1,1);}ctx.globalAlpha=1;}
  if(efx.includes('scan')){const sg=ctx.createLinearGradient(0,cs.scanY-40,0,cs.scanY+40);sg.addColorStop(0,'transparent');sg.addColorStop(0.5,cs.bossColor+'38');sg.addColorStop(1,'transparent');ctx.fillStyle=sg;ctx.fillRect(0,cs.scanY-40,W,80);}
  if(efx.includes('heartbeat')){const hb=Math.sin(cs.hbT*0.14);if(hb>0.82)withAlpha((hb-0.82)*2.5,()=>{ctx.fillStyle=cs.bossColor+'25';ctx.fillRect(0,0,W,H);});}
  if(efx.includes('vignette')){const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.76);vig.addColorStop(0,'transparent');vig.addColorStop(1,`rgba(0,0,0,${0.55+Math.sin(ts/820)*0.06})`);ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);}
  if(efx.includes('flicker')&&Math.random()<0.08){withAlpha(0.15,()=>{ctx.fillStyle=cs.bossColor;ctx.fillRect(0,0,W,H);});}
  if(efx.includes('gold')){ctx.save();const gs=55,off=(ts*0.14)%gs;ctx.strokeStyle='#ffcc0022';ctx.lineWidth=1;for(let x=-gs+off;x<W+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let y=-gs+off;y<H+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}if(Math.random()<0.3)spawnP(rand(0,W),rand(H*0.08,H*0.52),'#ffcc00',2,1.2);ctx.restore();}
  const BAR=88;
  ctx.fillStyle='#000000f2';ctx.fillRect(0,0,W,BAR);ctx.fillRect(0,H-BAR,W,BAR);
  glow(cs.bossColor,12);ctx.strokeStyle=cs.bossColor+'75';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,BAR);ctx.lineTo(W,BAR);ctx.stroke();ctx.beginPath();ctx.moveTo(0,H-BAR);ctx.lineTo(W,H-BAR);ctx.stroke();noGlow();
  if(boss){
    const nameAl=shot.showBoss?easeOut(Math.min(1,cs.fadeP*(cs.phase==='in'?1:0)+(cs.phase!=='in'?1:0))):0.38;
    const flicker=(cs.phase==='in'&&cs.fadeP<0.52)?(Math.random()>0.42?1:0.28):1;
    withAlpha(nameAl*flicker,()=>{glow(cs.bossColor,26);ctx.fillStyle=cs.bossColor;ctx.font='bold 22px Orbitron';ctx.textAlign='left';ctx.fillText(boss.name,40,BAR-25);noGlow();});
    withAlpha(0.36,()=>{ctx.fillStyle='#fff';ctx.font='9px Share Tech Mono';ctx.textAlign='left';ctx.fillText(`LEVEL ${currentLevel} OF 9  ·  ${boss.desc}`,40,BAR-8);});
  }
  withAlpha(0.24,()=>{ctx.fillStyle='#fff';ctx.font='9px Orbitron';ctx.textAlign='right';ctx.fillText('NEON GAUNTLET',W-40,BAR-9);});
  if(cs.locAlpha>0&&shot.loc){
    const lx=40,ly=H-BAR-55,lw=Math.min(600,shot.loc.length*8.2+80),lh=38;
    withAlpha(cs.locAlpha,()=>{ctx.fillStyle='#00000099';ctx.fillRect(lx,ly,lw,lh);glow(cs.bossColor,8);ctx.strokeStyle=cs.bossColor+'88';ctx.lineWidth=1;ctx.strokeRect(lx,ly,lw,lh);noGlow();ctx.fillStyle=cs.bossColor+'66';ctx.fillRect(lx,ly,3,lh);glow(cs.bossColor,6);ctx.fillStyle='#fff';ctx.font='bold 10px Share Tech Mono';ctx.textAlign='left';ctx.fillText(shot.loc,lx+12,ly+24);noGlow();});
  }
  if(cs.phase==='main'&&boss){
    const startY=H-BAR+17;const maxL=Math.floor((BAR-14)/22);const startL=Math.max(0,cs.lineIdx-maxL+1);
    for(let li=startL;li<=cs.lineIdx&&li<(shot.lines||[]).length;li++){
      const line=shot.lines[li];const isAct=li===cs.lineIdx;const text=isAct?line.txt.slice(0,cs.charIdx):line.txt;const row=li-startL;const y=startY+row*22;
      withAlpha(isAct?1:0.32,()=>{glow(line.col,isAct?14:0);ctx.fillStyle=line.col;ctx.font='bold 10px Orbitron';ctx.textAlign='left';ctx.fillText(`[${line.spk}]`,40,y+13);noGlow();ctx.fillStyle=isAct?'#fff':'#ffffff55';ctx.font='12px Share Tech Mono';ctx.fillText(text,40+162,y+13);if(isAct&&cs.charIdx<line.txt.length&&Math.floor(Date.now()/200)%2===0){const tw=ctx.measureText(text).width;ctx.fillStyle=line.col;ctx.fillRect(40+162+tw+4,y+2,8,14);}});
    }
    withAlpha(0.38+Math.sin(Date.now()/580)*0.18,()=>{ctx.fillStyle='#fff';ctx.font='9px Orbitron';ctx.textAlign='right';ctx.fillText('[ SPACE  ·  ADVANCE ]',W-40,H-6);});
  }
  if(ovAlpha>0){ctx.fillStyle=tc;ctx.globalAlpha=ovAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(cs.phase==='main'){withAlpha(0.2,()=>{ctx.fillStyle='#fff';ctx.font='8px Orbitron';ctx.textAlign='left';ctx.fillText('ESC — skip scene',40,BAR-42);});}
  ctx.textAlign='left';
}

    ctx.fillText('NEW POWERUP UNLOCKED',W/2,H/2-128);noGlow();
    const pulse=1+Math.sin(ts/400)*0.06;
    glow(def.color,42);ctx.fillStyle=def.color+'33';ctx.beginPath();ctx.arc(W/2,H/2-44,66*pulse,0,Math.PI*2);ctx.fill();noGlow();
    glow(def.color,20);ctx.strokeStyle=def.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(W/2,H/2-44,66*pulse,0,Math.PI*2);ctx.stroke();noGlow();
    glow(def.color,32);ctx.fillStyle=def.color;ctx.font='bold 46px Orbitron';ctx.textAlign='center';
    ctx.fillText(def.icon,W/2,H/2-24);noGlow();
    glow(def.color,18);ctx.fillStyle=def.color;ctx.font='bold 26px Orbitron';ctx.fillText(def.name,W/2,H/2+52);noGlow();
    ctx.fillStyle='#ffffffaa';ctx.font='13px Share Tech Mono';ctx.fillText(def.desc,W/2,H/2+80);
    const active=POWERUP_DEFS.filter(d=>activePowerups.includes(d.id));
    if(active.length>0){
      ctx.fillStyle='#ffffff30';ctx.font='9px Share Tech Mono';ctx.fillText('ACTIVE ARSENAL:',W/2,H/2+112);
      const iW=38,totalW=active.length*iW+(active.length-1)*5,sx=W/2-totalW/2;
      for(let i=0;i<active.length;i++){
        const d=active[i],ix=sx+i*(iW+5);
        ctx.fillStyle='#0a0a14';ctx.strokeStyle=d.color+'80';ctx.lineWidth=1;
        ctx.fillRect(ix,H/2+120,iW,iW);ctx.strokeRect(ix,H/2+120,iW,iW);
        glow(d.color,8);ctx.fillStyle=d.color;ctx.font='bold 14px Orbitron';ctx.textAlign='center';
        ctx.fillText(d.icon,ix+iW/2,H/2+143);noGlow();
      }
    }
    if(t>40){
      const bx=W/2-110,by=H/2+188;
      const p2=0.5+Math.sin(ts/300)*0.5;
      glow(def.color,12*p2);ctx.fillStyle=def.color+'22';ctx.strokeStyle=def.color;ctx.lineWidth=2;
      ctx.fillRect(bx,by,220,44);ctx.strokeRect(bx,by,220,44);noGlow();
      ctx.fillStyle=def.color;ctx.font='bold 13px Orbitron';ctx.textAlign='center';
      ctx.fillText('[ CONTINUE TO BATTLE ]',W/2,by+28);
    }
  });
}

// ================================================================
//  GAME STATE
// ================================================================
let gameState='intro',currentLevel=1;

// MODIFIED: boss death victory flash timer for visual feedback
let bossDeathFlash=0;

function startLevel(level){
  currentLevel=level;resetPlayer();boss=createBoss(level);particles=[];
  banner.active=false;
  startCutscene(level);gameState='cutscene';
}

// MODIFIED: triggerBossDeath now immediately clears all boss bullets,
// stops damage, and instantly advances to next level/victory
function triggerBossDeath(){
  boss.dead=true;
  // Clear ALL boss bullets instantly — no more damage possible
  boss.bullets=[];
  boss.minions=[];
  // Big explosion effects
  spawnP(boss.x,boss.y,boss.color,120,14);
  spawnP(boss.x,boss.y,'#fff',60,18);
  spawnP(boss.x,boss.y,'#ffcc00',40,10);
  flash('#fff',28);
  shake(24);
  bossDeathFlash=55; // short dramatic pause before advancing
}

function triggerPlayerDeath(){player.dead=true;spawnP(player.x,player.y,'#00fff7',55,8);flash('#ff0000',28);shake(12);setTimeout(()=>{gameState='gameover';},1400);}

// ── Click handler ─────────────────────────────────────────────────
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  const hit=(bx,by,bw=220,bh=44)=>mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;

  if(gameState==='intro'){intro.done=true;gameState='menu';}
  if(gameState==='menu'&&hit(W/2-110,H/2+96)){activePowerups=[];startLevel(1);}

  if(gameState==='powerup'&&puScreen.timer>40&&hit(W/2-110,H/2+188)){
    puScreen.active=false;
    currentLevel++;resetPlayer();boss=createBoss(currentLevel);particles=[];
    startCutscene(currentLevel);gameState='cutscene';
  }

  if((gameState==='gameover'||gameState==='victory')&&hit(W/2-110,H/2+70)){activePowerups=[];startLevel(1);}
});

// MODIFIED: helper to advance after boss dies
function advanceAfterBoss(){
  if(currentLevel>=MAX_LEVELS){
    gameState='victory';
  } else {
    // Grant powerup for next level, then go to cutscene
    const nextLvl=currentLevel+1;
    const def=grantPowerup(nextLvl);
    applyPowerupsToPlayer();
    if(def){
      puScreen={active:true,def,timer:0};
      gameState='powerup';
    } else {
      currentLevel=nextLvl;resetPlayer();boss=createBoss(currentLevel);particles=[];
      startCutscene(currentLevel);gameState='cutscene';
    }
  }
}

// Powerup screen continue (keyboard)
function handlePowerupContinue(){
  puScreen.active=false;
  currentLevel++;resetPlayer();boss=createBoss(currentLevel);particles=[];
  startCutscene(currentLevel);gameState='cutscene';
}

// ================================================================
//  MAIN LOOP
// ================================================================
function loop(ts){
  requestAnimationFrame(loop);
  ctx.save();
  if(shakeAmt>0.2){ctx.translate(rand(-shakeAmt,shakeAmt),rand(-shakeAmt,shakeAmt));shakeAmt*=0.7;}else shakeAmt=0;

  if(gameState==='intro'){updateIntro();drawIntro(ts);ctx.restore();return;}

  if(gameState==='menu'){
    drawBG();
    const t=ts/1000;
    ctx.save();ctx.translate(W/2,H/2-82);ctx.rotate(Math.sin(t*0.48)*0.13);
    glow('#ff44aa',38);ctx.fillStyle='#ff44aa';
    ctx.beginPath();for(let i=0;i<10;i++){const a=(i/10)*Math.PI*2+t*0.68;const r=i%2===0?62:28;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.fill();noGlow();ctx.restore();
    ctx.textAlign='center';
    glow('#00fff7',38);ctx.fillStyle='#00fff7';ctx.font='bold 56px Orbitron';ctx.fillText('BOSS RUSH',W/2,H/2+24);noGlow();
    ctx.fillStyle='#ffffff70';ctx.font='13px Share Tech Mono';ctx.fillText('NEON GAUNTLET  ·  9 BOSSES  ·  HARD MODE',W/2,H/2+54);
    ctx.fillStyle='#ffffff35';ctx.font='10px Share Tech Mono';ctx.fillText('WASD MOVE  ·  F SHOOT  ·  H HEAL ×5  ·  ESC SKIP SCENE  ·  R RESTART',W/2,H/2+76);
    const bx=W/2-110,by=H/2+96;
    glow('#00fff7',16);ctx.fillStyle='#00fff722';ctx.strokeStyle='#00fff7';ctx.lineWidth=2;ctx.fillRect(bx,by,220,44);ctx.strokeRect(bx,by,220,44);noGlow();
    ctx.fillStyle='#00fff7';ctx.font='bold 13px Orbitron';ctx.fillText('[ BEGIN GAUNTLET ]',W/2,by+28);
    ctx.fillStyle='#ffffff20';ctx.font='11px Share Tech Mono';ctx.fillText('by Param Tyagi',W/2,H-14);
    ctx.restore();return;
  }

  if(gameState==='cutscene'){
    updateCutscene();drawCutscene(ts);
    if(flashT>0){ctx.fillStyle=flashCol+'44';ctx.fillRect(0,0,W,H);flashT--;}
    ctx.restore();return;
  }

  if(gameState==='powerup'){
    drawPowerupScreen(ts);
    // Allow space/enter to continue from powerup screen
    if(puScreen.timer>40&&(keyJust(' ')||keyJust('Enter')||keyJust('f')||keyJust('F'))){
      handlePowerupContinue();
    }
    ctx.restore();return;
  }

  if(gameState==='playing'){
    if(keyJust('r')||keyJust('R')){activePowerups=[];ctx.restore();startLevel(1);return;}
    drawBG();
    if(flashT>0){ctx.fillStyle=flashCol+'44';ctx.fillRect(0,0,W,H);flashT--;}

    // MODIFIED: if boss is dead, run the brief death flash then advance
    if(boss.dead){
      updateParticles();
      drawPlayer();
      // Draw boss explosion (no shape, just particles)
      drawParticles();
      drawHUD();
      // Draw "ELIMINATED" banner during the flash
      bossDeathFlash--;
      const flashPct = bossDeathFlash / 55;
      withAlpha(flashPct * 0.85, () => {
        glow(boss.color, 44);
        ctx.fillStyle = boss.color;
        ctx.font = 'bold 52px Orbitron';
        ctx.textAlign = 'center';
        ctx.fillText('ELIMINATED', W/2, H/2);
        noGlow();
        // Continue prompt
        withAlpha(0.6, () => {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 13px Share Tech Mono';
          ctx.fillText('ADVANCING...', W/2, H/2 + 44);
        });
      });
      spawnP(boss.x + rand(-55,55), boss.y + rand(-55,55), boss.color, 5, 7);
      if(bossDeathFlash <= 0){
        advanceAfterBoss();
      }
      ctx.restore();return;
    }

    updatePlayer();updateBossAI(boss);checkCollisions();updateParticles();
    drawPlayer();drawBoss(boss,ts);drawParticles();drawHUD();
    ctx.restore();return;
  }

  if(gameState==='victory'){
    drawBG();updateParticles();
    if(Math.random()<0.4)spawnP(rand(0,W),rand(0,H),['#00fff7','#ff6aff','#ffcc00','#ff4444','#00ffee','#ff6600'][randInt(0,5)],6,5);
    drawParticles();
    ctx.textAlign='center';
    glow('#ffcc00',44);ctx.fillStyle='#ffcc00';ctx.font='bold 50px Orbitron';ctx.fillText('VICTORY',W/2,H/2-84);noGlow();
    glow('#fff',18);ctx.fillStyle='#fff';ctx.font='bold 18px Orbitron';ctx.fillText('THE ARCHITECT IS SILENCED',W/2,H/2-28);noGlow();
    ctx.fillStyle='#ffffff70';ctx.font='12px Share Tech Mono';ctx.fillText('The Gauntlet crumbles to static.',W/2,H/2+10);ctx.fillText('The neon fades to black.',W/2,H/2+30);
    ctx.fillStyle='#ffffff30';ctx.font='11px Share Tech Mono';ctx.fillText('by Param Tyagi',W/2,H/2+56);
    const bx=W/2-110,by=H/2+76;
    glow('#ffcc00',18);ctx.fillStyle='#ffcc0022';ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;ctx.fillRect(bx,by,220,44);ctx.strokeRect(bx,by,220,44);noGlow();
    ctx.fillStyle='#ffcc00';ctx.font='bold 13px Orbitron';ctx.fillText('[ PLAY AGAIN ]',W/2,by+28);
    ctx.restore();return;
  }

  if(gameState==='gameover'){
    drawBG();updateParticles();drawParticles();
    ctx.textAlign='center';
    glow('#ff4444',32);ctx.fillStyle='#ff4444';ctx.font='bold 46px Orbitron';ctx.fillText('SYSTEM FAILURE',W/2,H/2-68);noGlow();
    ctx.fillStyle='#ffffff90';ctx.font='14px Orbitron';ctx.fillText(`FELL ON LEVEL ${currentLevel}  —  ${BOSS_DEFS[currentLevel-1].name}`,W/2,H/2-14);
    ctx.fillStyle='#ffffff50';ctx.font='12px Share Tech Mono';ctx.fillText('The neon claims another soul.',W/2,H/2+18);
    const bx=W/2-110,by=H/2+70;
    glow('#ff4444',14);ctx.fillStyle='#ff444422';ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.fillRect(bx,by,220,44);ctx.strokeRect(bx,by,220,44);noGlow();
    ctx.fillStyle='#ff4444';ctx.font='bold 13px Orbitron';ctx.fillText('[ RESTART ]',W/2,by+28);
    ctx.restore();return;
  }
  ctx.restore();
}
requestAnimationFrame(loop);
</script>
