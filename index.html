<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOSS RUSH — Neon Gauntlet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    user-select: none;
  }

  #wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 900px;
    padding: 6px 0;
  }

  #game-title {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #00fff7;
    text-shadow: 0 0 10px #00fff7, 0 0 30px #00fff7;
  }

  #level-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #ff6aff;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #ff6aff;
  }

  #canvas-container {
    position: relative;
    width: 900px;
    height: 560px;
    border: 1px solid #1a1a2e;
    box-shadow: 0 0 0 1px #00fff730, 0 0 40px #00fff710, inset 0 0 60px #00001a;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 900px;
    height: 560px;
  }

  #canvas-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #controls-bar {
    display: flex;
    gap: 24px;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #ffffff50;
    letter-spacing: 2px;
  }

  .ctrl-key {
    display: inline-block;
    background: #ffffff0d;
    border: 1px solid #ffffff20;
    padding: 2px 6px;
    border-radius: 3px;
    color: #ffffffaa;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div id="wrapper">
  <div id="title-bar">
    <span id="game-title">BOSS RUSH</span>
    <span id="level-label">NEON GAUNTLET</span>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas" width="900" height="560"></canvas>
  </div>
  <div id="controls-bar">
    <span><span class="ctrl-key">W A S D</span> MOVE</span>
    <span><span class="ctrl-key">F</span> SHOOT</span>
    <span><span class="ctrl-key">H</span> HEAL ×7</span>
    <span><span class="ctrl-key">R</span> RESTART</span>
  </div>
</div>

<script>
// =============================================================================
//  BOSS RUSH — Neon Gauntlet (7-LEVEL CINEMATIC EDITION)
// =============================================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 900, H = 560;

// Global Game State
let gameState = 'playing'; // title, cutscene, playing, gameover, victory
let currentLevel = 1;
let boss = null;
let shakeAmt = 0;
let flashTimer = 0;
let flashColor = '#fff';

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {}, justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.key]) justPressed[e.key] = true;
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
function keyDown(k) { return !!keys[k]; }
function keyJust(k) { const v = !!justPressed[k]; justPressed[k] = false; return v; }

// ── Utilities ─────────────────────────────────────────────────────────────────
const lerp    = (a,b,t) => a + (b-a)*t;
const clamp   = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const rand    = (lo,hi) => lo + Math.random()*(hi-lo);
const ang     = (a,b) => Math.atan2(b.y-a.y, b.x-a.x);

// ── Canvas helpers ────────────────────────────────────────────────────────────
function glow(color, blur=10)  { ctx.shadowColor=color; ctx.shadowBlur=blur; }
function noGlow()              { ctx.shadowBlur=0; }
function withAlpha(a, fn)      { const prev=ctx.globalAlpha; ctx.globalAlpha=clamp(a,0,1); fn(); ctx.globalAlpha=prev; }

// ── Particles ─────────────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count=8, speed=3, upward=false) {
  for (let i=0; i<count; i++) {
    const a = upward ? rand(-Math.PI, 0) : rand(0, Math.PI*2);
    const s = rand(speed*0.4, speed);
    particles.push({
      x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:rand(0.018,0.055), r:rand(2,5), color
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.92; p.vy*=0.92; p.life-=p.decay; p.r*=0.97;
  }
}
function drawParticles() {
  for (const p of particles) {
    withAlpha(p.life, () => {
      glow(p.color,8); ctx.fillStyle=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    });
  }
  noGlow();
}

function shake(amt) { shakeAmt = Math.max(shakeAmt, amt); }
function flash(c='#fff', d=8) { flashTimer=d; flashColor=c; }

// ── Bullets ───────────────────────────────────────────────────────────────────
function makeBullet(x,y,vx,vy,color,r=5,dmg=10,owner='player') {
  return {x,y,vx,vy,color,r,dmg,owner,life:1};
}
function moveBullets(arr) {
  for (const b of arr) {
    b.x+=b.vx; b.y+=b.vy;
    if (boss?.level === 6) {
      const dx = boss.x - b.x, dy = boss.y - b.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 20 && dist < 200) { b.vx += dx * 0.002; b.vy += dy * 0.002; }
    }
  }
  return arr.filter(b => b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20&&b.life>0);
}
function drawBullets(arr) {
  for (const b of arr) {
    glow(b.color,14); ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  }
  noGlow();
}

// ── Player ────────────────────────────────────────────────────────────────────
const player = {
  x:W/2, y:H-100, w:20, h:24, speed:4.8,
  hp:120, maxHp:120,
  bullets:[], shootCooldown:0, shootRate:12,
  iframes:0, dead:false, trail:[],
  healCharges: 7, healCooldown: 0, healAnim: 0, healPopTimer: 0, healPopText: ''
};

function updatePlayer() {
  if (player.dead) return;
  if (keyDown('w')||keyDown('W')||keyDown('ArrowUp'))    player.y-=player.speed;
  if (keyDown('s')||keyDown('S')||keyDown('ArrowDown'))  player.y+=player.speed;
  if (keyDown('a')||keyDown('A')||keyDown('ArrowLeft'))  player.x-=player.speed;
  if (keyDown('d')||keyDown('D')||keyDown('ArrowRight')) player.x+=player.speed;
  player.x=clamp(player.x,player.w,W-player.w);
  player.y=clamp(player.y,player.h,H-player.h);

  if (player.shootCooldown>0) player.shootCooldown--;
  if ((keyDown('f')||keyDown('F')) && player.shootCooldown===0) {
    player.bullets.push(makeBullet(player.x,player.y-player.h,0,-10,'#00fff7',4,12,'player'));
    if (currentLevel >= 3) {
      player.bullets.push(makeBullet(player.x,player.y-player.h,-2,-9,'#00fff7',3,10,'player'));
      player.bullets.push(makeBullet(player.x,player.y-player.h, 2,-9,'#00fff7',3,10,'player'));
    }
    player.shootCooldown=player.shootRate;
  }

  // Heal Logic
  if (player.healCooldown>0) player.healCooldown--;
  if (keyJust('h')||keyJust('H')) {
    if (player.healCharges > 0 && player.hp < player.maxHp) {
      player.hp = Math.min(player.maxHp, player.hp + 35);
      player.healCharges--;
      player.healAnim = 80;
      player.healPopTimer = 100;
      player.healPopText = "+35 HP";
    }
  }

  player.bullets = moveBullets(player.bullets);
  if (player.iframes > 0) player.iframes--;
}

function drawPlayer() {
  if (player.dead) return;
  glow('#00fff7', 20); ctx.fillStyle = '#00fff7';
  ctx.beginPath(); ctx.moveTo(player.x, player.y-player.h);
  ctx.lineTo(player.x-player.w/2, player.y+player.h/2);
  ctx.lineTo(player.x+player.w/2, player.y+player.h/2);
  ctx.closePath(); ctx.fill(); noGlow();
  drawBullets(player.bullets);
}

// ── Boss Logic ───────────────────────────────────────────────────────────────
const BOSS_DEFS = [
  { name:'THE SENTINEL', color:'#ff4444', baseHp:200 },
  { name:'THE HYDRA',    color:'#ff9900', baseHp:320 },
  { name:'THE PHANTOM',  color:'#cc44ff', baseHp:450 },
  { name:'THE COLOSSUS', color:'#22ccff', baseHp:600 },
  { name:'THE VOID',     color:'#ff44aa', baseHp:900 },
  { name:'THE SINGULARITY', color:'#00ffee', baseHp:1100 },
  { name:'THE OVERMIND', color:'#ff0000', baseHp:1500 }
];

function initBoss() {
  const def = BOSS_DEFS[currentLevel-1];
  boss = { ...def, x: W/2, y: 120, hp: def.baseHp, maxHp: def.baseHp, bullets: [], shootTimer: 0 };
}

function updateBoss() {
  if (!boss) return;
  boss.shootTimer++;
  boss.x = W/2 + Math.sin(Date.now()/1000) * 200; // Simple movement

  if (boss.shootTimer % 60 === 0) {
    const a = Math.atan2(player.y - boss.y, player.x - boss.x);
    boss.bullets.push(makeBullet(boss.x, boss.y, Math.cos(a)*5, Math.sin(a)*5, boss.color, 6, 15, 'boss'));
  }
  boss.bullets = moveBullets(boss.bullets);

  // Collision
  player.bullets.forEach(b => {
    if (Math.hypot(b.x-boss.x, b.y-boss.y) < 40) {
      boss.hp -= b.dmg; b.life = 0;
      if (boss.hp <= 0) {
        currentLevel++;
        if (currentLevel > 7) gameState = 'victory';
        else initBoss();
      }
    }
  });

  boss.bullets.forEach(b => {
    if (Math.hypot(b.x-player.x, b.y-player.y) < 15 && player.iframes <= 0) {
      player.hp -= b.dmg; b.life = 0; player.iframes = 60;
      if (player.hp <= 0) gameState = 'gameover';
    }
  });
}

function drawBoss() {
  if (!boss) return;
  glow(boss.color, 30); ctx.fillStyle = boss.color;
  ctx.beginPath(); ctx.arc(boss.x, boss.y, 40, 0, Math.PI*2); ctx.fill(); noGlow();
  drawBullets(boss.bullets);

  // Health Bar
  ctx.fillStyle = '#222'; ctx.fillRect(W/2-200, 20, 400, 10);
  ctx.fillStyle = boss.color; ctx.fillRect(W/2-200, 20, 400 * (boss.hp/boss.maxHp), 10);
}

// ── Main Loop ────────────────────────────────────────────────────────────────
function loop() {
  ctx.fillStyle = '#020208'; ctx.fillRect(0,0,W,H); // Background

  if (gameState === 'playing') {
    updatePlayer();
    updateBoss();
    updateParticles();
    drawParticles();
    drawPlayer();
    drawBoss();
    
    // UI
    ctx.fillStyle = '#fff'; ctx.font = '14px Orbitron';
    ctx.fillText(`LVL ${currentLevel}: ${boss?.name}`, 20, 30);
    ctx.fillText(`HP: ${player.hp}`, 20, 50);
  } else if (gameState === 'gameover') {
    ctx.fillStyle = 'red'; ctx.textAlign = 'center'; ctx.font = '40px Orbitron';
    ctx.fillText("SYSTEM FAILURE", W/2, H/2);
    ctx.font = '16px Orbitron'; ctx.fillText("Press R to Reboot", W/2, H/2 + 40);
  } else if (gameState === 'victory') {
    ctx.fillStyle = '#00fff7'; ctx.textAlign = 'center'; ctx.font = '40px Orbitron';
    ctx.fillText("GAUNTLET CONQUERED", W/2, H/2);
  }

  if (keyJust('r') || keyJust('R')) location.reload();
  requestAnimationFrame(loop);
}

initBoss();
loop();
</script>
</body>
</html>
